# Woodpecker CI pipeline for the Insty VS Code extension.
# Note: `lint` is intentionally omitted - the repo declares an eslint script but
# ships no eslint config/dependency, so it would fail. Add it once eslint is set up.

steps:
  - name: install
    image: node:22
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile

  - name: compile
    image: node:22
    commands:
      - corepack enable
      - pnpm run compile
      - test -f dist/extension.js

  - name: package
    image: node:22
    commands:
      - corepack enable
      - pnpm run package

  - name: release
    image: insty-ci:llvm22
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: github_token
    commands:
      - gh release create "$CI_COMMIT_TAG" --repo "$CI_REPO" --title "$CI_COMMIT_TAG" --generate-notes || true
      - gh release upload "$CI_COMMIT_TAG" --repo "$CI_REPO" --clobber *.vsix
